// ══════════════════════════════════════════════
// DATE LOGIC — THE CORE FIX
//
// The cycle each day:
//   00:00 – 21:59 IST  → predict tomorrow's matches (window OPEN)
//   22:00 – 23:59 IST  → deadline passed, predict day-after-tomorrow (next window OPEN)
//
// "Active prediction date" = the match date people are currently predicting
// "Deadline passed"        = it is past 10 PM IST for that match date
// ══════════════════════════════════════════════
function istNow() {
  // Returns a Date object adjusted to IST (UTC+5:30)
  return new Date(new Date().getTime() + 5.5 * 60 * 60 * 1000);
}

function istDateStr(d) {
  // Returns YYYY-MM-DD for a Date object treated as IST
  const pad = n => String(n).padStart(2, '0');
  return `${d.getUTCFullYear()}-${pad(d.getUTCMonth()+1)}-${pad(d.getUTCDate())}`;
}

function addDays(d, n) {
  return new Date(d.getTime() + n * 86400000);
}

function getActivePredictionDate() {
  // ── LIVE MODE (no override) ──────────────────────────────────
  // Before 10 PM IST → predicting TOMORROW's matches
  // After  10 PM IST → predicting DAY-AFTER-TOMORROW's matches
  //                    (tonight's window is closed, next opens now)
  const ist  = istNow();
  const hour = ist.getUTCHours() + ist.getUTCMinutes() / 60;
  if (hour >= 22) {
    // After 10 PM — show matches 2 days from now
    return istDateStr(addDays(ist, 2));
  } else {
    // Before 10 PM — show tomorrow's matches
    return istDateStr(addDays(ist, 1));
  }
}

function deadlinePassed() {
  // Deadline for the active prediction date = 10 PM IST of the PREVIOUS day
  // i.e. once it's past 10 PM IST, the window for tomorrow is closed
  const ist  = istNow();
  const hour = ist.getUTCHours() + ist.getUTCMinutes() / 60;
  return hour >= 22;
}

function deadlineTime(matchDate) {
  // Returns a JS Date for 10 PM IST the day before matchDate
  // 10 PM IST = 16:30 UTC
  const d = new Date(matchDate + 'T16:30:00Z');
  d.setDate(d.getDate() - 1);
  return d;
}

function fmtDate(ds) {
  return new Date(ds + 'T12:00:00').toLocaleDateString('en-IN', {weekday:'long', day:'numeric', month:'long'});
}

function dk(date) { return date.replace(/-/g, '_'); }

// SCORING
// ══════════════════════════════════════════════
function calcPts(p, r) {
  if (!p || !r) return null;
  const ph=+p.h, pa=+p.a, rh=+r.h, ra=+r.a;
  if (isNaN(ph)||isNaN(pa)) return null;
  if (ph===rh && pa===ra) return 5;
  const po=ph>pa?'H':ph<pa?'A':'D', ro=rh>ra?'H':rh<ra?'A':'D';
  if (po===ro) return 3;
  if ((ph-pa)===(rh-ra)) return 1;
  return 0;
}

function memberStats(name) {
  let total=0, correct=0, exact=0, played=0;
  FIXTURES.forEach(f => {
    const r=liveResults[f.id], p=(livePredictions[name]||{})[f.id];
    if (r && p && typeof r === 'object' && 'h' in r) {
      played++;
      const pts=calcPts(p,r);
      if (pts!==null){total+=pts;if(pts>=3)correct++;if(pts===5)exact++;}
    }
  });
  return {total,correct,exact,played};
}

function leaderboard() {
  return [...liveMembers]
    .map(m => ({...m, ...memberStats(m.name)}))
    .sort((a,b) => b.total-a.total || b.exact-a.exact || b.correct-a.correct);
}

function hasSubmitted(name, date) { return !!(liveSubmitted[name]?.[dk(date)]); }
function isUnlocked(name, date)   { return !!(liveUnlocked[name]?.[dk(date)]); }

// ── JOKE GENERATOR — template based, uses real data ───────────────────────────
function generateJoke(matches, customJoke) {
  if (customJoke && customJoke.trim()) return customJoke.trim();
  if (!matches || !matches.length) return null;

  const jokes = [];
  matches.forEach(({home, away, rh, ra, exactPickers, correctPickers}) => {
    const diff = Math.abs(rh - ra);
    const total = rh + ra;
    const winner = rh > ra ? home : ra > rh ? away : null;
    const loser  = rh > ra ? away : ra > rh ? home : null;
    const score  = `${rh}–${ra}`;
    const exact  = exactPickers || [];
    const correct= correctPickers || [];

    let joke = '';

    if (exact.length > 0) {
      const names = exact.slice(0,2).join(' & ');
      const extras = exact.length > 2 ? ` and ${exact.length-2} more` : '';
      joke = `🎯 ${names}${extras} called ${home} ${score} ${away} EXACTLY! Fortune teller or football genius? Either way, respect! 🤩`;
    } else if (rh === ra) {
      if (correct.length > 0) {
        joke = `🤝 ${home} ${score} ${away} — a boring draw! ${correct.length} people predicted the stalemate. They deserve a prize just for watching. 😴`;
      } else {
        joke = `🤝 ${home} ${score} ${away} — nobody wanted this draw, and it shows — zero exact scores from the whole office! 😅`;
      }
    } else if (diff >= 3) {
      if (correct.length === 0) {
        joke = `💥 ${winner} absolutely demolished ${loser} ${score}! Nobody in the office saw THAT coming. Better luck predicting tomorrow! 😂`;
      } else {
        joke = `💥 ${winner} hammered ${loser} ${score}! ${correct.length} smart cookie${correct.length>1?'s':''} backed the right team. The rest — we don't talk about it. 😬`;
      }
    } else if (total === 0) {
      joke = `😴 ${home} 0–0 ${away} — zero goals, zero excitement, maximum yawning. At least ${correct.length || 'someone'} predicted the snooze-fest correctly! 💤`;
    } else if (diff === 1 && total >= 4) {
      joke = `🎢 ${home} ${score} ${away} — a thriller! ${correct.length} people got the result right but nobody nailed the exact score. So close! 😩`;
    } else {
      if (correct.length === 0) {
        joke = `🤔 ${home} ${score} ${away} — and zero people got it right! The World Cup remains unpredictable, and so does this office. 😂`;
      } else if (correct.length >= 5) {
        joke = `👀 ${home} ${score} ${away} — ${correct.length} people predicted this one! Were you all watching the same training video? 😄`;
      } else {
        joke = `⚽ ${home} ${score} ${away} — ${correct.length} got the result, ${exact.length} got it exact. Not bad, not great, very Lead and Leap! 😎`;
      }
    }
    if (joke) jokes.push(joke);
  });

  return jokes.length ? jokes[0] : null;
}

        </div>
      </div>`;
    }
    // #2 and #3
    if (top3.length > 1) {
      h += `<div style="border-top:1px solid rgba(0,0,0,0.07);padding-top:8px;display:flex;flex-direction:column;gap:5px">`;

          <span style="font-size:13px;font-weight:600;color:#111">${m.total} pts</span>
        </div>`;
      });
      h += `</div>`;
    }
    leaderEl.innerHTML = h || '<span style="color:#aaa">No predictions yet!</span>';
  }

  // ── DEADLINE REMINDER ──
  const ist  = istNow();
  const hour = ist.getUTCHours() + ist.getUTCMinutes() / 60;
  const ad   = getActivePredictionDate();
  const dlEl = document.getElementById('login-deadline');
  const dlTx = document.getElementById('login-deadline-text');
  if (dlEl && dlTx) {
    if (!deadlinePassed()) {
      dlEl.style.display = 'flex';
      dlTx.innerHTML = `Predict <strong>${fmtDate(ad)}</strong> matches — deadline <strong>tonight 10 PM IST</strong>`;
    } else {
      dlEl.style.display = 'flex';
      dlTx.innerHTML = `🔒 Predictions closed for today. Next window opens tomorrow morning.`;
    }
  }

  // ── LATEST MATCH HIGHLIGHT ──
  // Show the most recent date that has results entered — not necessarily yesterday
  const highlightCard = document.getElementById('login-highlight-card');
  const highlightContent = document.getElementById('login-highlight-content');
  if (!highlightCard || !highlightContent) return;

  // Find the latest date that has at least one result entered
  const datesWithResults = [...new Set(
    FIXTURES.filter(f => {
      const r = liveResults[f.id];
      return r && typeof r === 'object' && 'h' in r;
    }).map(f => f.date)
  )].sort().reverse();

  if (!datesWithResults.length) { highlightCard.style.display = 'none'; return; }

  const latestResultDate = datesWithResults[0];
  const doneFixtures = FIXTURES.filter(f => {
    const r = liveResults[f.id];
    return f.date === latestResultDate && r && typeof r === 'object' && 'h' in r;
  });

  if (!doneFixtures.length) { highlightCard.style.display = 'none'; return; }

  // Update section label to show actual date
  const hlLabel = highlightCard.querySelector('div');
  if (hlLabel) hlLabel.textContent = `⚽ latest results · ${fmtDate(latestResultDate)}`;

  // Build match data with who predicted what
  const matchData = doneFixtures.map(f => {
    const r = liveResults[f.id];
    const rh = r.h, ra = r.a;
    const exactPickers = [], correctPickers = [];
    liveMembers.forEach(m => {
      const p = (livePredictions[m.name] || {})[f.id];
      if (!p) return;
      const pts = calcPts(p, r);
      if (pts === 5) exactPickers.push(m.name);
      else if (pts === 3) correctPickers.push(m.name);
    });
    return { home: f.home, away: f.away, rh, ra, exactPickers, correctPickers };
  });

  // Get custom joke from Firebase if admin set one
  const customJoke = liveResults.__customJoke?.[latestResultDate.replace(/-/g,'_')] || '';
  const joke = generateJoke(matchData, customJoke);

  let h = '';
  // Show all yesterday's results
  doneFixtures.forEach(f => {
    const r = liveResults[f.id];
    h += `<div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
      <span style="font-size:13px;font-weight:600;color:#111">${f.home}</span>
      <span style="background:#e6f1fb;color:#0c447c;font-size:14px;font-weight:700;padding:3px 12px;border-radius:100px">${r.h} – ${r.a}</span>
      <span style="font-size:13px;font-weight:600;color:#111">${f.away}</span>
    </div>`;
  });

  // Joke
  if (joke) {
    h += `<div class="joke-text">${joke}</div>`;
  }

  // Points earned badges
  const allExact = [], allCorrect = [], allWrong = [];
  matchData.forEach(m => {
    m.exactPickers.forEach(n => { if(!allExact.includes(n)) allExact.push(n); });
    m.correctPickers.forEach(n => { if(!allCorrect.includes(n) && !allExact.includes(n)) allCorrect.push(n); });
  });
  liveMembers.forEach(m => {
    if (!allExact.includes(m.name) && !allCorrect.includes(m.name)) {
      const hadAny = doneFixtures.some(f => (livePredictions[m.name]||{})[f.id]);
      if (hadAny) allWrong.push(m.name);
    }
  });

  if (allExact.length || allCorrect.length) {
    h += `<div style="display:flex;flex-wrap:wrap;gap:5px;margin-top:4px">`;
    allExact.slice(0,4).forEach(n => {
      h += `<span style="font-size:11px;padding:2px 8px;background:#e8f5e9;color:#1a5c2a;border-radius:100px;font-weight:600">${n} +5 🎯</span>`;
    });
    allCorrect.slice(0,4).forEach(n => {
      h += `<span style="font-size:11px;padding:2px 8px;background:#e6f1fb;color:#0c447c;border-radius:100px;font-weight:600">${n} +3</span>`;
    });
    h += `</div>`;
  }

  highlightContent.innerHTML = h;
  highlightCard.style.display = 'block';
}

    sessionStorage.setItem('wc_session', JSON.stringify(session));

    initApp(); return;

  if (!member) { err.innerHTML='<div class="error-msg">Name not found.</div>'; return; }

  session = {name, admin:false};
  sessionStorage.setItem('wc_session', JSON.stringify(session));
  activeTab = 'predict';
  initApp();
}

  if (!fixs.length) {
    h += `<div class="card"><div class="empty-state">No fixtures scheduled for ${fmtDate(ad)}.<br>Check back tomorrow ⚽</div></div>`;

  } else if (passed && !unlocked) {
    // After 10 PM and not unlocked by admin — show closed message + next window info
    const nextDate = istDateStr(addDays(istNow(), 2));
    const nextFixs = FIXTURES.filter(f => f.date === nextDate);
    h += `<div class="danger-box">🔒 Predictions for <strong>${fmtDate(ad)}</strong> are now closed — deadline was 10 PM IST.<br><br>
      ${nextFixs.length ? `⏳ Next prediction window opens now for <strong>${fmtDate(nextDate)}</strong> matches. Come back after midnight!` : 'No upcoming fixtures found yet.'}
    </div>`;
    // Also show what they submitted (if anything)
    if (submitted) {
      h += `<div class="card"><p class="section-title">your submitted predictions for ${fmtDate(ad)}</p>`;
      fixs.forEach(f => {
        const pred=myPreds[f.id], result=liveResults[f.id];
        const pts=result&&pred?calcPts(pred,result):null;
        const cls=pts===5?'b-exact':pts===3?'b-correct':pts===1?'b-partial':pts===0?'b-wrong':'';
        h += `<div class="fixture-card locked">
          <div class="fix-meta"><span class="fix-group">Group ${f.group}</span><span class="fix-time">${f.ist} IST</span></div>
          <div class="fix-body">
            <span class="fix-team">${f.home}</span>
            <div class="score-box">
              ${pred?`<span class="pred-locked">${pred.h} – ${pred.a}</span>`:'<span style="color:#bbb">—</span>'}
              ${result?`<span style="font-size:12px;color:#888;margin-left:8px">Result: <strong>${result.h}–${result.a}</strong></span>`:''}
              ${pts!==null?`<span class="badge ${cls}" style="margin-left:6px">+${pts}pt${pts!==1?'s':''}</span>`:''}
            </div>
            <span class="fix-team right">${f.away}</span>
          </div>
        </div>`;
      });
      h += `</div>`;
    }

  } else if (submitted && !unlocked) {
    // Submitted and deadline not yet passed — locked view
    h += `<div class="success-box">✅ Your predictions for <strong>${fmtDate(ad)}</strong> are locked in. Good luck!</div>`;
    h += `<div class="card"><p class="section-title">your locked predictions</p>`;
    fixs.forEach(f => {
      const pred=myPreds[f.id], result=liveResults[f.id];
      const pts=result&&pred?calcPts(pred,result):null;
      const cls=pts===5?'b-exact':pts===3?'b-correct':pts===1?'b-partial':pts===0?'b-wrong':'';
      h += `<div class="fixture-card locked">
        <div class="fix-meta"><span class="fix-group">Group ${f.group}</span><span class="fix-time">${f.ist} IST</span></div>
        <div class="fix-body">
          <span class="fix-team">${f.home}</span>
          <div class="score-box">
            ${pred?`<span class="pred-locked">${pred.h} – ${pred.a}</span>`:'<span style="color:#bbb">—</span>'}
            ${result?`<span style="font-size:12px;color:#888;margin-left:8px">Result: <strong>${result.h}–${result.a}</strong></span>`:''}
            ${pts!==null?`<span class="badge ${cls}" style="margin-left:6px">+${pts}pt${pts!==1?'s':''}</span>`:''}
          </div>
          <span class="fix-team right">${f.away}</span>
        </div>
      </div>`;
    });
    h += `</div>`;

  } else {
    // Open prediction window
    if (unlocked) h += `<div class="warn-box">🔓 Admin has unlocked your predictions. Update your scores and re-submit before 10 PM IST.</div>`;
    h += `<div class="card"><p class="section-title">predict ${fmtDate(ad)}</p>`;
    fixs.forEach(f => {
      const pred=myPreds[f.id];
      h += `<div class="fixture-card">
        <div class="fix-meta"><span class="fix-group">Group ${f.group}</span><span class="fix-time">${f.ist} IST</span></div>
        <div class="fix-body">
          <span class="fix-team">${f.home}</span>
          <div class="score-box">
            <input type="number" min="0" max="20" class="sinp" id="h${f.id}" value="${pred?pred.h:''}" placeholder="0">
            <span class="vsep">–</span>
            <input type="number" min="0" max="20" class="sinp" id="a${f.id}" value="${pred?pred.a:''}" placeholder="0">
          </div>
          <span class="fix-team right">${f.away}</span>
        </div>
      </div>`;
    });
    h += `<div style="margin-top:14px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px">
      <span style="font-size:12px;color:#888">Fill all scores then submit. <strong>Cannot edit after submitting.</strong></span>
      <button class="btn-submit" onclick="doSubmit()">Submit Predictions ✓</button>
    </div></div>`;
  }

  tc.innerHTML = h;

  // Start countdown timer only when window is open
  if (cdTimer) { clearInterval(cdTimer); cdTimer = null; }
  if (!passed && (!submitted || unlocked)) {
    updateCd(ad);
    cdTimer = setInterval(() => updateCd(ad), 1000);
  }
}

function updateCd(ad) {
  const el = document.getElementById('cdtimer');
  if (!el) { clearInterval(cdTimer); return; }
  const diff = deadlineTime(ad) - new Date();
  if (diff <= 0) {
    el.textContent = 'CLOSED';
    el.classList.add('urgent');
    clearInterval(cdTimer);
    cdTimer = null;
    renderPredict(); // refresh to show closed state
    return;
  }
  const hh=Math.floor(diff/3600000), mm=Math.floor((diff%3600000)/60000), ss=Math.floor((diff%60000)/1000);
  el.textContent = `${String(hh).padStart(2,'0')}:${String(mm).padStart(2,'0')}:${String(ss).padStart(2,'0')}`;
  if (diff < 3600000) el.classList.add('urgent');
}

function doSubmit() {
  const me = session.name;
  const ad = getActivePredictionDate();
  const fixs = FIXTURES.filter(f => f.date === ad);
  if (deadlinePassed()) { alert('The 10 PM deadline has passed. Predictions are closed.'); return; }
  const preds={}, missing=[];
  fixs.forEach(f => {
    const hv=document.getElementById('h'+f.id)?.value;
    const av=document.getElementById('a'+f.id)?.value;
    if (hv===''||av===''||hv===undefined) missing.push(`${f.home} vs ${f.away}`);
    else preds[f.id]={h:+hv,a:+av};
  });
  if (missing.length) { alert('Fill ALL match scores before submitting:\n\n'+missing.join('\n')); return; }
  if (!confirm(`Submit predictions for ${fmtDate(ad)}?\n\nYou cannot change them after submitting.`)) return;
  const updates={};
  Object.entries(preds).forEach(([id,score]) => { updates[`predictions/${me}/${id}`]=score; });
  updates[`submitted/${me}/${dk(ad)}`]=true;
  updates[`unlocked/${me}/${dk(ad)}`]=null;
  db.ref().update(updates).then(()=>renderPredict()).catch(e=>alert('Error: '+e.message));
}

            <div style="font-size:14px;color:#111;line-height:1.5;word-break:break-word">${m.text}</div>
            <div style="display:flex;align-items:center;gap:8px;margin-top:8px">
              <button class="react-btn ${iReacted?'reacted':''}" onclick="reactWall('${id}')">

              </button>
              ${isAdmin?`<button onclick="deleteWallMsg('${id}')" style="background:none;border:none;font-size:11px;color:#aaa;cursor:pointer;padding:2px 6px">🗑 delete</button>`:''}

            </div>

    });
  }

  tc.innerHTML = h;

  // Live char counter
  const inp = document.getElementById('wall-input');

    inp.addEventListener('input', () => {
      const left = 150 - inp.value.length;
      const cc = document.getElementById('wall-charcount');
      if (cc) cc.textContent = `${left} chars left`;

function postWallMsg() {
  const inp = document.getElementById('wall-input');
  const text = inp?.value.trim();
  if (!text) { alert('Type something first! 😄'); return; }
  if (text.length > 150) { alert('Max 150 characters!'); return; }

  const me = session.admin ? 'Admin' : session.name;
  const msgId = 'msg_' + Date.now();
  db.ref(`wall/${msgId}`).set({
    name: me,
    text: text,
    time: Date.now(),
    reactions: {}
  }).then(() => {
    if (inp) inp.value = '';
    renderWall();
  }).catch(e => alert('Error: ' + e.message));
}

function reactWall(msgId) {
  const me = session.admin ? 'Admin' : session.name;
  const msg = liveWall[msgId];
  if (!msg) return;
  const alreadyReacted = !!(msg.reactions||{})[me];
  const ref = db.ref(`wall/${msgId}/reactions/${me}`);
  if (alreadyReacted) ref.remove().catch(e => alert('Error: '+e.message));
  else ref.set(true).catch(e => alert('Error: '+e.message));
}

function deleteWallMsg(msgId) {
  if (!confirm('Delete this message?')) return;
  db.ref(`wall/${msgId}/deleted`).set(true).catch(e => alert('Error: '+e.message));
}

function renderMyPreds() {
  const tc  = document.getElementById('tab-mypreds');
  const me  = session.name;
  const myP = livePredictions[me] || {};

  // Group fixtures by date, only show dates that have passed deadline
  const ist     = istNow();
  const todayIST = istDateStr(ist);

  // All fixture dates up to and including today
  const pastDates = [...new Set(
    FIXTURES.filter(f => f.date <= todayIST).map(f => f.date)
  )].sort().reverse();

  const {total, correct, exact, played} = memberStats(me);

  let h = `<div class="stats-grid">
    <div class="stat-card"><div class="stat-num">${total}</div><div class="stat-label">total points</div></div>
    <div class="stat-card"><div class="stat-num">${played}</div><div class="stat-label">played</div></div>
    <div class="stat-card"><div class="stat-num">${correct}</div><div class="stat-label">correct</div></div>
    <div class="stat-card"><div class="stat-num">${exact}</div><div class="stat-label">exact scores</div></div>
  </div>`;

  if (!pastDates.length) {
    h += `<div class="card"><div class="empty-state">No past predictions yet. Come back after your first match day! ⚽</div></div>`;
    tc.innerHTML = h; return;
  }

  pastDates.forEach(date => {
    const fixs = FIXTURES.filter(f => f.date === date);
    if (!fixs.length) return;

    // Points earned on this day
    let dayPts = 0, dayPlayed = 0;
    fixs.forEach(f => {
      const r = liveResults[f.id];
      const p = myP[f.id];
      if (r && p && typeof r === 'object' && 'h' in r) {
        const pts = calcPts(p, r);
        if (pts !== null) { dayPts += pts; dayPlayed++; }
      }
    });

    const hasPreds = fixs.some(f => myP[f.id]);
    if (!hasPreds) {
      // Show date with "no prediction" note
      h += `<div class="card" style="margin-bottom:10px">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:0">
          <span style="font-size:13px;font-weight:600;color:#111">${fmtDate(date)}</span>
          <span class="badge b-closed">no prediction</span>
        </div>
      </div>`;
      return;
    }

    h += `<div class="card" style="margin-bottom:10px">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
        <span style="font-size:13px;font-weight:600;color:#111">${fmtDate(date)}</span>
        ${dayPlayed > 0
          ? `<span style="font-size:13px;font-weight:700;color:#185fa5">+${dayPts} pts</span>`
          : `<span style="font-size:12px;color:#888">results pending</span>`}
      </div>`;

    fixs.forEach(f => {
      const pred   = myP[f.id];
      const result = liveResults[f.id];
      const hasResult = result && typeof result === 'object' && 'h' in result;
      const pts    = hasResult && pred ? calcPts(pred, result) : null;
      const ptsCls = pts===5?'b-exact':pts===3?'b-correct':pts===1?'b-partial':pts===0?'b-wrong':'';
      const ptsLabel = pts===5?'🎯 +5':pts===3?'✅ +3':pts===1?'↗ +1':pts===0?'❌ 0':'';

      h += `<div style="display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid rgba(0,0,0,0.05)">
        <div style="flex:1;min-width:0">
          <div style="font-size:13px;font-weight:500;color:#111;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">
            ${f.home} vs ${f.away}
          </div>
          <div style="font-size:11px;color:#888;margin-top:1px">Group ${f.group} · ${f.ist} IST</div>
        </div>
        <div style="display:flex;align-items:center;gap:8px;flex-shrink:0">
          ${pred
            ? `<span style="font-size:14px;font-weight:700;color:#185fa5">${pred.h}–${pred.a}</span>`
            : `<span style="font-size:13px;color:#bbb">—</span>`}
          ${hasResult
            ? `<span style="font-size:12px;color:#888">vs <strong>${result.h}–${result.a}</strong></span>`
            : `<span style="font-size:11px;color:#bbb">pending</span>`}
          ${pts !== null
            ? `<span class="badge ${ptsCls}" style="min-width:48px;text-align:center">${ptsLabel}</span>`
            : ''}
        </div>
      </div>`;
    });

    h += `</div>`;
  });

  tc.innerHTML = h;
}

function renderAdmin() {
  const tc = document.getElementById('tab-admin');
  const ad = getActivePredictionDate();

  // Admin result entry:
  // Show ALL fixture dates up to and including TODAY in IST.
  // Admin can enter/edit results for any past or current match day at any time.
  // There is NO deadline for admin result entry — only prediction entry has a deadline.
  const ist = istNow();
  const todayIST = istDateStr(ist);

  // Build byDate for ALL fixtures on or before today
  const byDate = {};
  FIXTURES.forEach(f => {
    if (f.date <= todayIST) {
      if (!byDate[f.date]) byDate[f.date] = [];
      byDate[f.date].push(f);
    }
  });
  // Also include any fixture dates that already have results entered (safety net)
  FIXTURES.forEach(f => {
    const r = liveResults[f.id];
    if (r && typeof r==='object' && 'h' in r && !byDate[f.date]) {
      byDate[f.date] = byDate[f.date] || [];
      if (!byDate[f.date].find(x=>x.id===f.id)) byDate[f.date].push(f);
    }
  });
  const adminDates = Object.keys(byDate).sort().reverse();

  const subCount = liveMembers.filter(m => hasSubmitted(m.name, ad)).length;

  let h = `<div class="warn-box">🔐 Admin panel · PIN 9999 · Do not share this screen.</div>
  <div class="stats-grid" style="margin-bottom:1rem">
    <div class="stat-card"><div class="stat-num">${liveMembers.length}</div><div class="stat-label">players</div></div>
    <div class="stat-card"><div class="stat-num">${subCount}</div><div class="stat-label">submitted</div></div>
    <div class="stat-card"><div class="stat-num">${liveMembers.length-subCount}</div><div class="stat-label">pending</div></div>
    <div class="stat-card"><div class="stat-num">${Object.keys(liveResults).length}</div><div class="stat-label">results in</div></div>
  </div>

  <div class="card"><p class="section-title">📋 enter match results</p>
  <div class="info-box" style="margin-bottom:12px">Enter the final score after each match ends. Leaderboard updates instantly for all players.</div>`;

  adminDates.forEach(date => {
    h += `<div style="font-size:11px;font-weight:600;color:#888;padding:8px 0 4px;border-top:1px solid rgba(0,0,0,0.06);margin-top:6px;text-transform:uppercase;letter-spacing:.05em">${fmtDate(date)}</div>`;
    (byDate[date]||[]).forEach(f => {
      const r=liveResults[f.id];
      h += `<div class="admin-fix-row">
        <div class="ateams">${f.home} vs ${f.away} <span style="font-size:11px;color:#aaa">Grp ${f.group} · ${f.ist} IST</span></div>`;
      if (r && typeof r==='object' && 'h' in r) {
        h += `<span class="entered-tag">${r.h}–${r.a} ✓</span>
              <button class="btn-sm" style="font-size:11px;padding:2px 8px" onclick="clearRes(${f.id})">Edit</button>`;
      } else {
        h += `<input type="number" min="0" max="20" class="rinp" id="rh${f.id}" placeholder="H">
              <span style="font-size:12px;color:#bbb">–</span>
              <input type="number" min="0" max="20" class="rinp" id="ra${f.id}" placeholder="A">
              <button class="btn-save" onclick="saveRes(${f.id})">Save</button>`;
      }
      h += `</div>`;
    });
  });

  h += `</div>

  <div class="card"><p class="section-title">👁 submissions & unlock · ${fmtDate(ad)}</p>
  <div class="info-box" style="margin-bottom:10px">Unlock lets a member re-edit their predictions. They auto-lock again after re-submitting.</div>`;

  liveMembers.forEach(m => {
    const sub=hasSubmitted(m.name,ad), unlocked=isUnlocked(m.name,ad);
    const myPreds=livePredictions[m.name]||{};
    const av=avC(m.name);
    h += `<div style="padding:9px 0;border-bottom:1px solid rgba(0,0,0,0.05)">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:${sub?'6px':'0'}">
        <div class="avatar" style="background:${av.bg};color:${av.tx};width:30px;height:30px;font-size:11px;flex-shrink:0">${ini(m.name)}</div>
        <span style="flex:1;font-size:13px;font-weight:600">${m.name}</span>
        <span class="badge ${sub?(unlocked?'b-unlock':'b-sub'):'b-closed'}">${sub?(unlocked?'🔓 unlocked':'✓ submitted'):'⏳ pending'}</span>
        ${sub?`<button class="${unlocked?'btn-lock':'btn-unlock'}" onclick="toggleUnlock('${m.name}','${ad}',${unlocked})">${unlocked?'Lock':'Unlock'}</button>`:''}
      </div>
      ${sub ? `<div style="display:flex;flex-wrap:wrap;gap:4px;padding-left:38px">
        ${FIXTURES.filter(f=>f.date===ad).map(f=>{
          const p=myPreds[f.id];
          return p
            ? `<span style="font-size:12px;padding:2px 8px;background:#f5f5f7;border-radius:6px">${f.home} <strong>${p.h}–${p.a}</strong> ${f.away}</span>`
            : `<span style="font-size:12px;padding:2px 8px;background:#fafafa;border-radius:6px;color:#aaa">${f.home} vs ${f.away}: —</span>`;
        }).join('')}
      </div>` : ''}
    </div>`;
  });

  h += `</div>

  <div class="card"><p class="section-title">👥 manage members & PINs</p>
  <div class="warn-box" style="margin-bottom:10px">Send each PIN privately via WhatsApp DM using "Copy msg".</div>`;

  liveMembers.forEach((m, i) => {
    h += `<div class="member-row">
      <span style="color:#aaa;font-size:12px;width:22px;flex-shrink:0">${i+1}.</span>
      <input class="edit-inp" value="${m.name}" style="flex:1;min-width:80px" onchange="updateMember(${i},'name',this.value)">
      <input class="edit-inp" maxlength="4" value="${m.pin}" style="width:58px;font-family:monospace;font-weight:700;color:#185fa5;text-align:center" onchange="updateMember(${i},'pin',this.value)">
      <button class="copy-btn" onclick="copyMsg('${m.name}','${m.pin}')">Copy msg</button>
    </div>`;
  });

  h += `</div>

  <div class="card"><p class="section-title">😂 customise today's joke</p>
  <div class="info-box" style="margin-bottom:10px">Leave blank to use the auto-generated joke. Or type your own funny line below — it will show on the login screen for everyone after yesterday's matches.</div>
  <div style="margin-bottom:8px">
    <div style="font-size:12px;font-weight:500;color:#666;margin-bottom:5px">Custom joke for <strong>${fmtDate(istDateStr(istNow()))}</strong> results</div>
    <textarea id="custom-joke-input" style="width:100%;padding:10px 13px;font-size:13px;border:1px solid rgba(0,0,0,0.18);border-radius:10px;background:#fff;color:#111;min-height:80px;resize:vertical;font-family:inherit;line-height:1.5" placeholder="e.g. Brazil showed up, Morocco didn't get the memo 😂 — Naseef sir called it perfectly as usual!">${liveResults.__customJoke?.[istDateStr(istNow()).replace(/-/g,'_')]||''}</textarea>
  </div>
  <div style="display:flex;gap:8px">
    <button class="btn-save" onclick="saveCustomJoke()">Save joke</button>
    <button class="btn-sm" onclick="clearCustomJoke()">Clear (use auto)</button>
  </div>
  </div>`;

  tc.innerHTML = h;
}

// ══════════════════════════════════════════════
// ADMIN ACTIONS
// ══════════════════════════════════════════════
function saveRes(id) {
  const h=document.getElementById('rh'+id)?.value;
  const a=document.getElementById('ra'+id)?.value;
  if (h===''||a===''||h===undefined) return;
  db.ref(`results/${id}`).set({h:+h,a:+a}).catch(e=>alert('Error: '+e.message));
}

function clearRes(id) {
  db.ref(`results/${id}`).remove().catch(e=>alert('Error: '+e.message));
}

function toggleUnlock(name, date, currentlyUnlocked) {
  const ref=db.ref(`unlocked/${name}/${dk(date)}`);
  if (currentlyUnlocked) ref.remove().catch(e=>alert('Error: '+e.message));
  else ref.set(true).catch(e=>alert('Error: '+e.message));
}

function updateMember(i, field, val) {
  const updated=[...liveMembers];
  updated[i]={...updated[i],[field]:val.trim()};
  db.ref('members').set(updated).catch(e=>alert('Error saving: '+e.message));
}

function saveCustomJoke() {
  const val = document.getElementById('custom-joke-input')?.value.trim() || '';
  const dateKey = istDateStr(istNow()).replace(/-/g,'_');
  db.ref(`results/__customJoke/${dateKey}`).set(val || null)
    .then(() => alert('✅ Joke saved! It will appear on the login screen.'))
    .catch(e => alert('Error: ' + e.message));
}

function clearCustomJoke() {
  const dateKey = istDateStr(istNow()).replace(/-/g,'_');
  db.ref(`results/__customJoke/${dateKey}`).remove()
    .then(() => { alert('✅ Cleared! Auto-joke will be used.'); renderAdmin(); })
    .catch(e => alert('Error: ' + e.message));
}

function copyMsg(name, pin) {
  const msg=`Hi ${name}! 🏆\n\nYou're invited to Lead and Leap World Cup 2026 Prediction Contest!\n\n🔗 Link: https://ll-wc-prediction.vercel.app\n👤 Name: ${name}\n🔑 PIN: ${pin}\n\nPredict tomorrow's match scores every evening before 10 PM IST.\nMost points by July 19 wins the prize!\n\nGood luck! ⚽🇮🇳`;
  navigator.clipboard?.writeText(msg)
    .then(()=>alert('✅ Copied! Paste in WhatsApp to '+name))
    .catch(()=>alert('PIN for '+name+': '+pin));
}

// ══════════════════════════════════════════════
// BOOT
// ══════════════════════════════════════════════
initFirebase();
if (session) { initApp(); } else { initLogin(); }
</script>
