    return fmt(new Date(ist.getTime() + 48*60*60*1000));
  }
  return fmt(tomorrow);
}

function getDeadline(matchDate) {
  const d = new Date(matchDate + 'T16:30:00Z');
  d.setDate(d.getDate() - 1);
  return d;
}

function deadlinePassed() {
  return false; // ← TESTING OVERRIDE — remove this line on June 11 to go live
  return new Date() > getDeadline(getActivePredictionDate());
}

function fmtDate(ds) {
  return new Date(ds + 'T12:00:00').toLocaleDateString('en-IN', {weekday:'long', day:'numeric', month:'long'});
}

function dateKey(date) {
  return date.replace(/-/g, '_');
}

function initFirebase() {
  try {
    firebase.initializeApp(FIREBASE_CONFIG);
    db = firebase.database();

    db.ref('members').once('value', snap => {
      if (!snap.exists()) db.ref('members').set(DEFAULT_MEMBERS);
    });

    db.ref('members').on('value', snap => {
      if (snap.exists()) liveMembers = snap.val();
      liveLoaded = true; tryRender();
    });
    db.ref('predictions').on('value', snap => {
      livePredictions = snap.exists() ? snap.val() : {};
      tryRender();
    });
    db.ref('submitted').on('value', snap => {
      liveSubmitted = snap.exists() ? snap.val() : {};
      tryRender();
    });
    db.ref('results').on('value', snap => {
      liveResults = snap.exists() ? snap.val() : {};
      tryRender();
    });
    db.ref('unlocked').on('value', snap => {

function tryRender() {
  if (!liveLoaded) return;

  if (session && document.getElementById('tc')) {
    renderTabContent();
  } else {
    render();
  }
}

// ── SCORING ───────────────────────────────────────────────────────
function calcPts(p, r, fixture=null) {
  if (!p || !r) return null;
  const ph=+p.h, pa=+p.a, rh=+r.h, ra=+r.a;
  if (isNaN(ph)||isNaN(pa)) return null;
  let pts = 0;
  if (ph===rh && pa===ra) pts = 5;
  else {
    const po=ph>pa?'H':ph<pa?'A':'D', ro=rh>ra?'H':rh<ra?'A':'D';
    if (po===ro) pts = 3;
    else if ((ph-pa)===(rh-ra)) pts = 1;
  }
  return pts * stageMultiplier(fixture);
}


function getFixtureStage(fixture) {
  if (!fixture) return 'group';
  if (fixture.stage) return fixture.stage;
  const label = String(fixture.group || fixture.round || '').toLowerCase();
  if (label.includes('semi')) return 'semi';
  if (label.includes('final')) return fixture.id === 'third' ? 'third' : 'final';
  if (label.includes('quarter') || label.includes('round of 16') || label.includes('round of 32') || label.includes('knockout') || label.includes('playoff')) return 'knockout';
  return 'group';
}

function stageMultiplier(fixture) {
  const stage = getFixtureStage(fixture);
  if (stage === 'semi' || stage === 'final' || stage === 'third') return 2;
  if (stage === 'knockout' || stage === 'playoff') return 1.5;
  return 1;
}

function formatPts(pts) {
  return Number.isInteger(pts) ? String(pts) : pts.toFixed(1);
}

function memberStats(name) {
  let total=0, correct=0, exact=0, played=0;
  allFixtures().forEach(f => {
    const r = liveResults[f.id];
    const p = (livePredictions[name]||{})[f.id];
    if (r && p) {
      played++;
      const pts = calcPts(p, r, f);
      const basePts = calcPts(p, r);
      if (pts !== null) {
        total += pts;
        if (basePts >= 3) correct++;
        if (basePts === 5) exact++;
      }
    }
  });
  return {total, correct, exact, played};
}

function leaderboard() {
  return liveMembers
    .map(m => ({...m, ...memberStats(m.name)}))
    .sort((a,b) => b.total-a.total || b.correct-a.correct || b.exact-a.exact);
}

function hasSubmitted(name, date) {
  return !!(liveSubmitted[name] && liveSubmitted[name][dateKey(date)]);
}

function isUnlocked(name, date) {
  return !!(liveUnlocked[name] && liveUnlocked[name][dateKey(date)]);
}

// ── AVATARS ───────────────────────────────────────────────────────
const AV_BG=['#e6f1fb','#e8f5e9','#fff8e1','#fce4ec','#f3e5f5','#e0f7fa','#fff3e0'];
const AV_TX=['#0c447c','#1a5c2a','#7a5100','#880e4f','#4a148c','#006064','#e65100'];
function avC(name){let h=0;for(let c of name)h=(h*31+c.charCodeAt(0))%7;return{bg:AV_BG[h],tx:AV_TX[h]};}
function initials(n){return n.split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2);}

// ── RENDER SHELL ──────────────────────────────────────────────────
function render() {
  const root = document.getElementById('root');
  if (!session) { renderLogin(root); return; }
  renderApp(root);
}

function setTab(t) {
  tab = t;
  // update active tab highlight
  document.querySelectorAll('.tab').forEach(el => {
    el.classList.toggle('active', el.dataset.tab === t);
  });
  renderTabContent();
}

function renderApp(root) {
  const isAdmin = session.admin;
  const tabs = isAdmin
    ? [['admin','⚙️ Admin'],['knockout','🏟️ Knockout'],['leaderboard','🏆 Board'],['results','📊 Results'],['rules','📋 Rules']]
    : [['predict','⚽ Predict'],['knockout','🏟️ Knockout'],['leaderboard','🏆 Board'],['results','📊 Results'],['rules','📋 Rules']];

  // Always rebuild the shell so tabs stay in sync with session/tab state
  root.innerHTML = `
    <div class="tabs">${tabs.map(([id,lbl])=>`<button class="tab ${tab===id?'active':''}" data-tab="${id}" onclick="setTab('${id}')">${lbl}</button>`).join('')}</div>
    <div id="tc"></div>
    <div style="text-align:center;margin-top:8px">
      <span style="font-size:12px;color:#888">${isAdmin ? 'Admin session' : 'Signed in as <strong>'+session.name+'</strong>'}</span>
      <button class="btn-sm" onclick="doLogout()" style="margin-left:8px;font-size:11px;padding:3px 9px">Sign out</button>
    </div>`;

  renderTabContent();
}

function renderTabContent() {
  const tc = document.getElementById('tc');
  if (!tc) return;
  if      (tab==='predict'     && !session.admin) renderPredict(tc);
  else if (tab==='knockout')                      renderKnockout(tc);
  else if (tab==='leaderboard')                   renderLeaderboard(tc);
  else if (tab==='results')                       renderResults(tc);
  else if (tab==='rules')                         renderRules(tc);
  else if (tab==='admin'       && session.admin)  renderAdmin(tc);
}

function doLogin() {
  const name = document.getElementById('sel').value;
  const pin  = [0,1,2,3].map(i => document.getElementById('p'+i).value).join('');
  const err  = document.getElementById('lerr');
  if (!name) { err.innerHTML='<div class="error-msg">Please select your name.</div>'; return; }
  if (pin.length < 4) { err.innerHTML='<div class="error-msg">Enter your full 4-digit PIN.</div>'; return; }
  if (name === '__admin__') {
    if (pin === ADMIN_PIN) {
      session = {admin:true};
      sessionStorage.setItem('wc_session', JSON.stringify(session));
      tab = 'admin';
      document.getElementById('root').innerHTML = '';
      render(); return;
    }
    err.innerHTML='<div class="error-msg">Wrong admin PIN.</div>'; return;
  }
  const member = liveMembers.find(m => m.name === name);
  if (!member) { err.innerHTML='<div class="error-msg">Name not found.</div>'; return; }
  if (member.pin !== pin) { err.innerHTML='<div class="error-msg">Wrong PIN. Contact Irfan if you forgot it.</div>'; return; }
  session = {name, admin:false};
  sessionStorage.setItem('wc_session', JSON.stringify(session));
  tab = 'predict';
  document.getElementById('root').innerHTML = '';
  render();
}

function doLogout() {
  session = null;
  sessionStorage.removeItem('wc_session');
  document.getElementById('root').innerHTML = '';
  render();
}

function renderPredict(tc) {

  const fixtures   = allFixtures().filter(f => f.date === activeDate);
  const passed     = deadlinePassed();
  const submitted  = hasSubmitted(me, activeDate);
  const unlocked   = isUnlocked(me, activeDate);
  const myPreds    = livePredictions[me] || {};

  let h = `<div class="stats-grid">
    <div class="stat-card"><div class="stat-num">${total}</div><div class="stat-label">points</div></div>
    <div class="stat-card"><div class="stat-num">${rank ? '#'+rank : '-'}</div><div class="stat-label">rank</div></div>

    <div class="stat-card"><div class="stat-num">${exact}</div><div class="stat-label">exact scores</div></div>
  </div>`;

  if (!passed && (!submitted || unlocked)) {
    h += `<div class="deadline-bar">
      <div><div class="dl-label">Predicting for</div><div class="dl-val">${fmtDate(activeDate)}</div></div>
      <div style="text-align:right"><div class="dl-label">Deadline tonight</div><div class="countdown" id="cdtimer">--:--:--</div></div>
    </div>`;
  }

  if (!fixtures.length) {
    h += `<div class="card"><div class="empty-state">No fixtures for ${fmtDate(activeDate)}<br>Check back later ⚽</div></div>`;

  } else if (submitted && !unlocked) {
    // LOCKED STATE
    h += `<div class="success-box">✅ Your predictions for <strong>${fmtDate(activeDate)}</strong> are locked in. Good luck!</div>`;
    h += `<div class="card"><p class="section-title">your locked predictions</p>`;
    fixtures.forEach(f => {
      const pred = myPreds[f.id];
      const result = liveResults[f.id];
      const pts = result && pred ? calcPts(pred, result, f) : null;
      const basePts = result && pred ? calcPts(pred, result) : null;
      const ptsCls = basePts===5?'b-exact':basePts===3?'b-correct':basePts===1?'b-partial':basePts===0?'b-wrong':'';
      h += `<div class="fixture-card locked">
        <div class="fix-meta"><span class="fix-group">${f.group ? (f.group.startsWith('Group') ? f.group : 'Group ' + f.group) : stageLabel(f.stage)}</span><span class="fix-time">${f.ist ? f.ist + ' IST' : ''}</span></div>
        <div class="fix-body">
          <span class="fix-team">${f.home}</span>
          <div class="score-box">
            ${pred ? `<span class="pred-locked">${pred.h} – ${pred.a}</span>` : '<span style="color:#bbb;font-size:13px">no pick</span>'}
            ${result ? `<span style="font-size:12px;color:#888;margin-left:8px">Result: <strong>${result.h}–${result.a}</strong></span>` : ''}
            ${pts !== null ? `<span class="badge ${ptsCls}" style="margin-left:6px">+${formatPts(pts)} pts</span>` : ''}
          </div>
          <span class="fix-team right">${f.away}</span>
        </div>
      </div>`;
    });
    h += `</div>`;

  } else if (passed && !unlocked) {
    h += `<div class="danger-box">⏰ The 10 PM deadline has passed. Predictions for <strong>${fmtDate(activeDate)}</strong> are closed.</div>`;

  } else {
    // OPEN FOR PREDICTION (new or re-edit after unlock)
    if (unlocked) {
      h += `<div class="warn-box">🔓 Admin has unlocked your predictions. Update your scores and submit again before the deadline.</div>`;
    }
    h += `<div class="card"><p class="section-title">predict ${fmtDate(activeDate)}</p>`;
    fixtures.forEach(f => {
      const pred = myPreds[f.id];
      h += `<div class="fixture-card">
        <div class="fix-meta"><span class="fix-group">${f.group ? (f.group.startsWith('Group') ? f.group : 'Group ' + f.group) : stageLabel(f.stage)}</span><span class="fix-time">${f.ist ? f.ist + ' IST' : ''}</span></div>
        <div class="fix-body">
          <span class="fix-team">${f.home}</span>
          <div class="score-box">
            <input type="number" min="0" max="20" class="sinp" id="h${f.id}" value="${pred ? pred.h : ''}" placeholder="0">
            <span class="vsep">–</span>
            <input type="number" min="0" max="20" class="sinp" id="a${f.id}" value="${pred ? pred.a : ''}" placeholder="0">
          </div>
          <span class="fix-team right">${f.away}</span>
        </div>
      </div>`;
    });
    h += `<div style="margin-top:14px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px">
      <span style="font-size:12px;color:#888">Fill all scores, then submit. You <strong>cannot edit</strong> after submitting.</span>
      <button class="btn-submit" onclick="doSubmit()">Submit Predictions ✓</button>
    </div></div>`;
  }

  tc.innerHTML = h;

  if (countdownTimer) clearInterval(countdownTimer);
  if (!passed && (!submitted || unlocked)) {
    updateCountdown();
    countdownTimer = setInterval(updateCountdown, 1000);
  }
}

function updateCountdown() {
  const el = document.getElementById('cdtimer');
  if (!el) { clearInterval(countdownTimer); return; }
  const diff = getDeadline(getActivePredictionDate()) - new Date();
  if (diff <= 0) { el.textContent='CLOSED'; el.classList.add('urgent'); clearInterval(countdownTimer); renderTabContent(); return; }
  const hh=Math.floor(diff/3600000), mm=Math.floor((diff%3600000)/60000), ss=Math.floor((diff%60000)/1000);
  el.textContent = `${String(hh).padStart(2,'0')}:${String(mm).padStart(2,'0')}:${String(ss).padStart(2,'0')}`;
  if (diff < 3600000) el.classList.add('urgent');
}

function doSubmit() {
  const me = session.name;
  const activeDate = getActivePredictionDate();
  const fixtures = FIXTURES.filter(f => f.date === activeDate);
  if (deadlinePassed()) { alert('Deadline has passed!'); return; }

  const preds = {};
  const missing = [];
  fixtures.forEach(f => {
    const hv = document.getElementById('h'+f.id)?.value;
    const av = document.getElementById('a'+f.id)?.value;
    if (hv==='' || av==='' || hv===undefined || av===undefined) {
      missing.push(`${f.home} vs ${f.away}`);
    } else {
      preds[f.id] = {h:+hv, a:+av};
    }
  });

  if (missing.length) { alert('Please fill scores for ALL matches:\n\n' + missing.join('\n')); return; }
  if (!confirm(`Submit predictions for ${fmtDate(activeDate)}?\n\nYou cannot change them after submitting.`)) return;

  const updates = {};
  Object.entries(preds).forEach(([id, score]) => {
    updates[`predictions/${me}/${id}`] = score;
  });
  updates[`submitted/${me}/${dateKey(activeDate)}`] = true;
  updates[`unlocked/${me}/${dateKey(activeDate)}`]  = null; // re-lock after submit

  db.ref().update(updates)
    .then(() => renderTabContent())
    .catch(e => alert('Error saving: ' + e.message));
}

function allFixtures() {
  return [...FIXTURES, ...getKnockoutFixtures()];
}

function getKnockoutFixtures() {
  return KNOCKOUT_TEMPLATE.flatMap(col => col.matches.map(m => ({
    id: m.id,
    date: m.date,
    ist: '',
    stage: m.stage,
    group: stageLabel(m.stage),
    home: resolveBracketTeam(m.homeSlot),
    away: resolveBracketTeam(m.awaySlot),
    label: m.label,
    next: m.next,
    loserNext: m.loserNext
  })));
}

function stageLabel(stage) {
  if (stage === 'semi') return 'Semi-final';
  if (stage === 'final') return 'Final';
  if (stage === 'third') return 'Third-place';
  if (stage === 'knockout') return 'Knockout';
  return 'Group';
}

function getGroupTable() {
  const groups = {};
  FIXTURES.forEach(f => {
    if (!f.group || !liveResults[f.id]) return;
    const r = liveResults[f.id];
    if (!groups[f.group]) groups[f.group] = {};
    [f.home, f.away].forEach(team => {
      if (!groups[f.group][team]) groups[f.group][team] = {team, group:f.group, pts:0, gd:0, gf:0, ga:0, played:0};
    });
    const h = groups[f.group][f.home], a = groups[f.group][f.away];
    h.played++; a.played++;
    h.gf += r.h; h.ga += r.a; h.gd = h.gf - h.ga;
    a.gf += r.a; a.ga += r.h; a.gd = a.gf - a.ga;
    if (r.h > r.a) h.pts += 3;
    else if (r.h < r.a) a.pts += 3;
    else { h.pts += 1; a.pts += 1; }
  });
  const sorted = {};
  Object.keys(groups).forEach(g => {
    sorted[g] = Object.values(groups[g]).sort((x,y) => y.pts-x.pts || y.gd-x.gd || y.gf-x.gf || x.team.localeCompare(y.team));
  });
  return sorted;
}

function getQualifiedTeams() {
  const tables = getGroupTable();
  const qualified = { winners:{}, runners:{}, thirds:[] };
  Object.keys(tables).sort().forEach(g => {
    const rows = tables[g];
    if (rows[0]) qualified.winners[g] = rows[0];
    if (rows[1]) qualified.runners[g] = rows[1];
    if (rows[2]) qualified.thirds.push(rows[2]);
  });
  qualified.thirds.sort((a,b) => b.pts-a.pts || b.gd-a.gd || b.gf-a.gf || a.group.localeCompare(b.group));
  qualified.bestThirds = qualified.thirds.slice(0,8);
  qualified.bestThirdGroups = qualified.bestThirds.map(t => t.group).sort();
  return qualified;
}

function findThirdPlaceTeam(patternId) {
  const q = getQualifiedTeams();
  const allowed = THIRD_PLACE_PATTERNS[patternId] || [];
  const team = q.bestThirds.find(t => allowed.includes(t.group));
  return team ? team.team : `Best 3rd-place (${allowed.join('/')})`;
}

function getFixtureResultById(id) {
  return liveResults[id] || null;
}

function getWinnerFromResult(id) {
  const fixture = allFixtures().find(f => String(f.id) === String(id));
  const result = getFixtureResultById(id);
  if (!fixture || !result) return null;
  if (result.h === result.a) return `${fixture.home} / ${fixture.away} (ET/Pens)`;
  return result.h > result.a ? fixture.home : fixture.away;
}

function getLoserFromResult(id) {
  const fixture = allFixtures().find(f => String(f.id) === String(id));
  const result = getFixtureResultById(id);
  if (!fixture || !result) return null;
  if (result.h === result.a) return `${fixture.home} / ${fixture.away} (ET/Pens)`;
  return result.h < result.a ? fixture.home : fixture.away;
}

function resolveBracketTeam(slot) {
  if (!slot) return 'TBD';
  const q = getQualifiedTeams();
  if (slot.type === 'winner') return q.winners[slot.group]?.team || `Winner Group ${slot.group}`;
  if (slot.type === 'runnerup') return q.runners[slot.group]?.team || `Runner-up Group ${slot.group}`;
  if (slot.type === 'third') return findThirdPlaceTeam(slot.pattern);
  if (slot.type === 'winnerMatch') return getWinnerFromResult(slot.match) || `Winner ${slot.match.toUpperCase()}`;
  if (slot.type === 'loserMatch') return getLoserFromResult(slot.match) || `Loser ${slot.match.toUpperCase()}`;
  return 'TBD';
}

function renderBracketMatch(m) {
  const fixture = getKnockoutFixtures().find(f => f.id === m.id) || m;
  const res = liveResults[m.id];
  const homeScore = res ? res.h : '—';
  const awayScore = res ? res.a : '—';
  const homeWinner = res && res.h > res.a;
  const awayWinner = res && res.a > res.h;
  return `<div class="bracket-match">
    <div class="bracket-meta"><span>${m.label}</span><span>${fmtDate(m.date)}</span></div>
    <div class="bracket-team ${homeWinner ? 'winner' : ''}"><span>${fixture.home}</span><span class="bracket-score">${homeScore}</span></div>
    <div class="bracket-team ${awayWinner ? 'winner' : ''}"><span>${fixture.away}</span><span class="bracket-score">${awayScore}</span></div>
    <div class="bracket-path">${m.loserNext ? 'Loser → ' + m.loserNext.toUpperCase() + ' · ' : ''}${m.next ? 'Winner → ' + m.next.toUpperCase() : 'Winner decided here'}</div>
  </div>`;
}

  const q = getQualifiedTeams();

  h += `<div class="bracket-wrap"><div class="bracket">`;
  KNOCKOUT_TEMPLATE.forEach(col => {
    h += `<div class="bracket-col"><div class="bracket-head">${col.title}</div><div class="bracket-list">${col.matches.map(renderBracketMatch).join('')}</div></div>`;
  });
  h += `</div></div></div>`;
  tc.innerHTML = h;
}

function renderAdmin(tc) {
  const now = new Date();
  const ist = new Date(now.getTime() + 5.5*60*60*1000);
  const pad = n => String(n).padStart(2,'0');
  const nextDay = new Date(ist.getTime() + 24*60*60*1000);

  const adminFixtures = FIXTURES.filter(f => f.date <= nextDayIST || f.date === activeDate).slice(-30);

  const activeDate = getActivePredictionDate();

    <div class="stat-card"><div class="stat-num">${liveMembers.length}</div><div class="stat-label">players</div></div>
    <div class="stat-card"><div class="stat-num">${submissionCount}</div><div class="stat-label">submitted</div></div>
    <div class="stat-card"><div class="stat-num">${liveMembers.length - submissionCount}</div><div class="stat-label">pending</div></div>
    <div class="stat-card"><div class="stat-num">${Object.keys(liveResults).length}</div><div class="stat-label">results in</div></div>
  </div>

  <div class="card"><p class="section-title">enter match results</p>
  <div class="info-box" style="margin-bottom:12px">Enter the final score after each match. Points calculate instantly for all players.</div>`;

  Object.keys(byDate).sort().reverse().forEach(date => {
    h += `<div style="font-size:11px;font-weight:600;color:#888;padding:8px 0 5px;border-top:1px solid rgba(0,0,0,0.06);margin-top:4px;text-transform:uppercase;letter-spacing:0.05em">${fmtDate(date)}</div>`;
    byDate[date].forEach(f => {
      const r = liveResults[f.id];
      h += `<div class="admin-fix-row">
        <div class="ateams">${f.home} vs ${f.away} <span style="font-size:11px;color:#aaa">Grp ${f.group} · ${f.ist} IST</span></div>`;
      if (r) {

              <button class="btn-sm" style="font-size:11px;padding:2px 8px" onclick="clearRes(${f.id})">Edit</button>`;
      } else {
        h += `<input type="number" min="0" max="20" class="rinp" id="rh${f.id}" placeholder="H">
              <span style="font-size:13px;color:#bbb">–</span>
              <input type="number" min="0" max="20" class="rinp" id="ra${f.id}" placeholder="A">
              <button class="btn-save" onclick="saveRes(${f.id})">Save</button>`;
      }
      h += `</div>`;
    });
  });

  // ── Submission status + UNLOCK controls ──
  h += `</div><div class="card"><p class="section-title">submissions today · ${fmtDate(activeDate)}</p>
  <div class="info-box" style="margin-bottom:12px">Use <strong>Unlock</strong> to let a member re-edit their predictions. They will be auto-locked again after they re-submit.</div>`;

  liveMembers.forEach(m => {
    const sub      = hasSubmitted(m.name, activeDate);
    const unlocked = isUnlocked(m.name, activeDate);
    const av       = avC(m.name);
    h += `<div style="display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid rgba(0,0,0,0.05)">
      <div class="avatar" style="background:${av.bg};color:${av.tx};width:30px;height:30px;font-size:11px;flex-shrink:0">${initials(m.name)}</div>
      <span style="flex:1;font-size:13px;font-weight:500">${m.name}</span>
      <span class="badge ${sub ? (unlocked ? 'b-unlocked' : 'b-submitted') : 'b-closed'}">
        ${sub ? (unlocked ? '🔓 unlocked' : '✓ submitted') : '⏳ pending'}
      </span>
      ${sub
        ? `<button class="${unlocked ? 'btn-lock' : 'btn-unlock'}" onclick="toggleUnlock('${m.name}','${activeDate}',${unlocked})">
             ${unlocked ? 'Lock' : 'Unlock'}
           </button>`
        : ''}
    </div>`;
  });

  h += `</div><div class="card"><p class="section-title">manage members & PINs</p>
  <div class="warn-box" style="margin-bottom:10px">Send each PIN privately via WhatsApp DM. Use the "Copy msg" button.</div>
  <table class="member-table">
    <tr><th>#</th><th>Name</th><th>PIN</th><th></th></tr>
    ${liveMembers.map((m,i) => `<tr>
      <td style="color:#aaa;font-size:12px">${i+1}</td>
      <td><input class="edit-inp" value="${m.name}" style="width:110px" onchange="updateMember(${i},'name',this.value)"></td>
      <td><input class="edit-inp" maxlength="4" value="${m.pin}" style="width:60px;font-family:monospace;font-weight:700;color:#185fa5;text-align:center" onchange="updateMember(${i},'pin',this.value)"></td>
      <td><button class="copy-btn" onclick="copyMsg('${m.name}','${m.pin}')">Copy msg</button></td>
    </tr>`).join('')}

// ── ADMIN ACTIONS ─────────────────────────────────────────────────
function saveRes(id) {
  const h = document.getElementById('rh'+id)?.value;
  const a = document.getElementById('ra'+id)?.value;
  if (h===''||a===''||h===undefined) return;
  db.ref(`results/${id}`).set({h:+h, a:+a}).catch(e => alert('Error: '+e.message));
}

function clearRes(id) {
  db.ref(`results/${id}`).remove().catch(e => alert('Error: '+e.message));
}

function toggleUnlock(name, date, currentlyUnlocked) {
  const key = dateKey(date);
  if (currentlyUnlocked) {
    db.ref(`unlocked/${name}/${key}`).remove().catch(e => alert('Error: '+e.message));
  } else {
    db.ref(`unlocked/${name}/${key}`).set(true).catch(e => alert('Error: '+e.message));
  }
}

function updateMember(i, field, val) {
  const updated = [...liveMembers];
  updated[i] = {...updated[i], [field]: val.trim()};
  db.ref('members').set(updated).catch(e => alert('Error: '+e.message));
}

function copyMsg(name, pin) {
  const msg = `Hi ${name}! 🏆\n\nYou're invited to our WC 2026 Office Prediction Contest!\n\n🔗 App: https://ll-wc-prediction.vercel.app\n👤 Name: ${name}\n🔑 PIN: ${pin}\n\nPredict tomorrow's match scores every evening before 10 PM IST.\nMost points by July 19 wins the prize!\n\nGood luck! ⚽🇮🇳`;
  navigator.clipboard?.writeText(msg)
    .then(() => alert('✅ Copied! Paste in WhatsApp to ' + name))
    .catch(() => alert('PIN for ' + name + ': ' + pin));
}
