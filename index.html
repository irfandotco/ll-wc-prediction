// Deadline for a given match date = 10 PM IST (16:30 UTC) of the PREVIOUS day
function deadlineFor(matchDate) {
  const d = new Date(matchDate + 'T16:30:00Z');
  d.setDate(d.getDate() - 1);
  return d;
}

// Which match-date should we show for predictions right now?
// After 10 PM IST → show next day's matches
// Before 10 PM IST → show tomorrow's matches (= next day from today)
function getActivePredictionDate() {
  const now = new Date();
  // IST = UTC+5:30
  const istOffset = 5.5 * 60 * 60 * 1000;
  const istNow = new Date(now.getTime() + istOffset);
  const istHour = istNow.getUTCHours() + istNow.getUTCMinutes()/60;
  // IST date string
  const y = istNow.getUTCFullYear();
  const m = String(istNow.getUTCMonth()+1).padStart(2,'0');
  const d = String(istNow.getUTCDate()).padStart(2,'0');
  const todayIST = `${y}-${m}-${d}`;

  if(istHour >= 22) {
    // After 10 PM → show day-after-tomorrow's matches
    const tomorrow = new Date(istNow.getTime() + 24*60*60*1000);
    const ty = tomorrow.getUTCFullYear();
    const tm = String(tomorrow.getUTCMonth()+1).padStart(2,'0');
    const td = String(tomorrow.getUTCDate()).padStart(2,'0');
    return `${ty}-${tm}-${td}`;
  } else {
    // Before 10 PM → show tomorrow's matches
    const tomorrow = new Date(istNow.getTime() + 24*60*60*1000);
    const ty = tomorrow.getUTCFullYear();
    const tm = String(tomorrow.getUTCMonth()+1).padStart(2,'0');
    const td = String(tomorrow.getUTCDate()).padStart(2,'0');
    return `${ty}-${tm}-${td}`;
  }
}

function getDeadlineForActiveDate() {
  const ad = getActivePredictionDate();
  return deadlineFor(ad);
}

function isDeadlinePassed() {

function calcPts(p, r) {
  if(!p || !r) return null;
  const ph=+p.h, pa=+p.a, rh=+r.h, ra=+r.a;

  if(ph===rh && pa===ra) return 5;
  const po=ph>pa?'H':ph<pa?'A':'D', ro=rh>ra?'H':rh<ra?'A':'D';
  if(po===ro) return 3;
  if((ph-pa)===(rh-ra)) return 1;
  return 0;
}

    if(r && p) { played++; const pts=calcPts(p,r); if(pts!==null){total+=pts; if(pts>=3)correct++; if(pts===5)exact++;} }
  });
  return {total,correct,exact,played};
}

function leaderboard() {
  return S.members
    .map(m => ({...m, ...memberStats(m.name)}))
    .sort((a,b) => b.total-a.total || b.correct-a.correct || b.exact-a.exact);
}

const AV_BG=['#e6f1fb','#eaf3de','#faeeda','#faece7','#fbeaf0','#eeedfe','#e1f5ee'];
const AV_TX=['#0c447c','#27500a','#633806','#712b13','#72243e','#3c3489','#085041'];
function avC(name){let h=0;for(let c of name)h=(h*31+c.charCodeAt(0))%7;return{bg:AV_BG[h],tx:AV_TX[h]};}
function initials(n){return n.split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2);}

function fmtDate(ds) {
  return new Date(ds+'T12:00:00').toLocaleDateString('en-IN',{weekday:'long',day:'numeric',month:'long'});
}
function fmtDeadline(dt) {
  return dt.toLocaleString('en-IN',{weekday:'short',day:'numeric',month:'short',hour:'2-digit',minute:'2-digit',hour12:true,timeZone:'Asia/Kolkata'});
}

// ── RENDER ────────────────────────────────────────────────────────────────────
function render() {
  const root = document.getElementById('root');
  if(!S.session && !S.adminSession){ renderLogin(root); return; }
  renderApp(root);
}

function renderLogin(root) {
  root.innerHTML = `
  <div class="login-wrap">
    <div class="card">
      <div style="text-align:center;margin-bottom:1.1rem">
        <div style="font-size:26px;margin-bottom:5px">🔐</div>
        <h2>Sign in to play</h2>
        <p class="sub">Select your name and enter your 4-digit PIN</p>
      </div>
      <div id="lerr"></div>
      <div class="field-label">Your name</div>
      <select id="sel" class="inp">
        <option value="">Choose name...</option>
        ${S.members.map(m=>`<option value="${m.name}">${m.name}</option>`).join('')}
        <option value="__admin__">⚙️ Admin</option>
      </select>
      <div class="field-label">PIN</div>
      <div class="pin-row">
        ${[0,1,2,3].map(i=>`<input class="pin-d" maxlength="1" type="password" inputmode="numeric" id="p${i}">`).join('')}
      </div>
      <button class="btn-primary" onclick="doLogin()">Enter ⚽</button>
    </div>
    <div class="info-box" style="margin-top:.8rem">Your PIN was shared by the admin (Irfan). Each person has a unique 4-digit PIN. Contact Irfan if you need yours.</div>
  </div>`;
  for(let i=0;i<4;i++){
    const el=document.getElementById('p'+i);
    el.addEventListener('input',()=>{if(el.value&&i<3)document.getElementById('p'+(i+1)).focus();});
    el.addEventListener('keydown',e=>{if(e.key==='Backspace'&&!el.value&&i>0)document.getElementById('p'+(i-1)).focus();});
  }
}

function doLogin() {
  const name=document.getElementById('sel').value;
  const pin=[0,1,2,3].map(i=>document.getElementById('p'+i).value).join('');
  const err=document.getElementById('lerr');
  if(!name){err.innerHTML='<div class="error-msg">Please select your name.</div>';return;}
  if(pin.length<4){err.innerHTML='<div class="error-msg">Enter your full 4-digit PIN.</div>';return;}
  if(name==='__admin__'){
    if(pin===ADMIN_PIN){S.adminSession=true;S.session=null;tab='admin';save();render();return;}
    err.innerHTML='<div class="error-msg">Wrong admin PIN.</div>';return;
  }
  const member=S.members.find(m=>m.name===name);
  if(!member){err.innerHTML='<div class="error-msg">Name not found.</div>';return;}
  if(member.pin!==pin){err.innerHTML='<div class="error-msg">Wrong PIN. Contact Irfan if you forgot it.</div>';return;}
  S.session=name;S.adminSession=false;tab='predict';save();render();
}

function doLogout(){S.session=null;S.adminSession=false;save();render();}

function renderApp(root) {
  const isAdmin=S.adminSession;
  const tabs=isAdmin
    ?[['admin','⚙️ Admin'],['leaderboard','🏆 Board'],['results','📊 Results'],['rules','📋 Rules']]
    :[['predict','⚽ Predict'],['leaderboard','🏆 Board'],['results','📊 Results'],['rules','📋 Rules']];
  root.innerHTML=`
  <div class="tabs">${tabs.map(([id,lbl])=>`<button class="tab ${tab===id?'active':''}" onclick="switchTab('${id}')">${lbl}</button>`).join('')}</div>
  <div id="tc"></div>
  <div style="text-align:center;margin-top:6px">
    <span style="font-size:12px;color:var(--color-text-secondary,#666)">${isAdmin?'Admin session':'Signed in as <strong>'+S.session+'</strong>'}</span>
    <button class="btn-sm" onclick="doLogout()" style="margin-left:8px;font-size:11px;padding:3px 9px">Sign out</button>
  </div>`;
  switchTab(tab, true);
}

function switchTab(t, skipSet) {
  if(!skipSet) tab=t;
  // re-render tabs active state
  document.querySelectorAll('.tab').forEach(el=>el.classList.toggle('active', el.textContent.includes(t==='predict'?'⚽':t==='leaderboard'?'🏆':t==='results'?'📊':t==='rules'?'📋':'⚙️')));
  const tc=document.getElementById('tc');
  if(!tc) return;
  if(t==='predict') renderPredict(tc);
  else if(t==='leaderboard') renderLeaderboard(tc);
  else if(t==='results') renderResults(tc);
  else if(t==='rules') renderRules(tc);
  else if(t==='admin') renderAdmin(tc);
}

// ── PREDICT TAB ───────────────────────────────────────────────────────────────
let countdownTimer = null;

function renderPredict(tc) {
  const me = S.session;
  const {total,correct,exact} = memberStats(me);
  const lb = leaderboard();
  const rank = lb.findIndex(r=>r.name===me)+1;
  const activeDate = getActivePredictionDate();
  const fixtures = getTodayFixtures();
  const deadline = getDeadlineForActiveDate();
  const passed = isDeadlinePassed();
  const submitted = hasSubmitted(me, activeDate);

  let h = `<div class="stats-grid">
    <div class="stat-card"><div class="stat-num">${total}</div><div class="stat-label">points</div></div>
    <div class="stat-card"><div class="stat-num">${rank?'#'+rank:'-'}</div><div class="stat-label">rank</div></div>
    <div class="stat-card"><div class="stat-num">${correct}</div><div class="stat-label">correct</div></div>
    <div class="stat-card"><div class="stat-num">${exact}</div><div class="stat-label">exact scores</div></div>
  </div>`;

  // Deadline bar
  if(!passed) {
    h+=`<div class="deadline-bar">
      <div><div class="dl-label">Predict matches for</div><div class="dl-date">${fmtDate(activeDate)}</div></div>
      <div style="text-align:right"><div class="dl-label">Deadline</div><div class="countdown" id="cdtimer">--:--:--</div></div>
    </div>`;
  }

  if(!fixtures.length) {
    h+=`<div class="card"><div style="text-align:center;padding:2rem;color:var(--color-text-secondary,#666);font-size:14px">No fixtures scheduled for ${fmtDate(activeDate)}.<br>Check back later! ⚽</div></div>`;
  } else if(submitted) {
    h+=`<div class="success-box">✅ You've submitted your predictions for <strong>${fmtDate(activeDate)}</strong>. Good luck! Results will appear after the matches.</div>`;
    h+=`<div class="card"><p class="section-title">your predictions for ${fmtDate(activeDate)}</p>`;
    fixtures.forEach(f => {
      const pred=(S.predictions[me]||{})[f.id];
      const result=S.results[f.id];
      let pts=result&&pred?calcPts(pred,result):null;
      const ptsCls=pts===5?'b-exact':pts===3?'b-correct':pts===1?'b-partial':pts===0?'b-wrong':'';
      h+=`<div class="fixture-card submitted">
        <div class="fix-header"><span class="fix-group">Group ${f.group}</span><span class="fix-time">${f.ist} IST</span></div>
        <div class="fix-teams">
          <span class="fix-team">${f.home}</span>
          <div class="score-box">
            ${pred?`<span class="result-display" style="font-size:15px;color:var(--color-text-secondary,#666)">${pred.h} – ${pred.a}</span>`:'<span style="font-size:13px;color:var(--color-text-secondary,#666)">—</span>'}
            ${result?`<span style="font-size:12px;color:var(--color-text-secondary,#666);margin-left:6px">→ <strong>${result.h}–${result.a}</strong></span>`:''}
            ${pts!==null?`<span class="badge ${ptsCls}" style="margin-left:6px">+${pts}pt${pts!==1?'s':''}</span>`:''}
          </div>
          <span class="fix-team away">${f.away}</span>
        </div>
      </div>`;
    });
    h+=`</div>`;
  } else if(passed) {
    h+=`<div class="warn-box">⏰ The deadline for <strong>${fmtDate(activeDate)}</strong> has passed. Predictions are now closed for today.</div>`;
  } else {
    // Active prediction window
    h+=`<div class="card"><p class="section-title">predict ${fmtDate(activeDate)} — submit before 10 PM IST</p>`;
    fixtures.forEach(f => {
      const pred=(S.predictions[me]||{})[f.id];
      h+=`<div class="fixture-card" id="fc${f.id}">
        <div class="fix-header"><span class="fix-group">Group ${f.group}</span><span class="fix-time">${f.ist} IST</span></div>
        <div class="fix-teams">
          <span class="fix-team">${f.home}</span>
          <div class="score-box">
            <input type="number" min="0" max="20" class="sinp" id="h${f.id}" value="${pred?pred.h:''}" placeholder="0" oninput="autosave(${f.id})">
            <span class="vsep">–</span>
            <input type="number" min="0" max="20" class="sinp" id="a${f.id}" value="${pred?pred.a:''}" placeholder="0" oninput="autosave(${f.id})">
          </div>
          <span class="fix-team away">${f.away}</span>
        </div>
      </div>`;
    });
    h+=`<div style="margin-top:14px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px">
      <span style="font-size:12px;color:var(--color-text-secondary,#666)">Fill all scores then submit. You cannot edit after submitting.</span>
      <button class="btn-submit" id="submit-btn" onclick="doSubmit()">Submit Predictions ✓</button>
    </div></div>`;
  }

  tc.innerHTML = h;

  // Start countdown
  if(countdownTimer) clearInterval(countdownTimer);
  if(!passed && !submitted && document.getElementById('cdtimer')) {
    updateCountdown();
    countdownTimer = setInterval(updateCountdown, 1000);
  }
}

function updateCountdown() {
  const el = document.getElementById('cdtimer');
  if(!el) { clearInterval(countdownTimer); return; }
  const diff = getDeadlineForActiveDate() - new Date();
  if(diff <= 0) { el.textContent = 'CLOSED'; el.classList.add('urgent'); clearInterval(countdownTimer); render(); return; }
  const h = Math.floor(diff/3600000);
  const m = Math.floor((diff%3600000)/60000);
  const s = Math.floor((diff%60000)/1000);
  el.textContent = `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
  if(diff < 3600000) el.classList.add('urgent');
}

function autosave(id) {
  const hv=document.getElementById('h'+id)?.value;
  const av=document.getElementById('a'+id)?.value;
  if(hv===''||av==='') return;
  const me=S.session;
  if(!S.predictions[me]) S.predictions[me]={};
  S.predictions[me][id]={h:+hv,a:+av};
  save();
}

function doSubmit() {
  const me=S.session;
  const activeDate=getActivePredictionDate();
  const fixtures=getTodayFixtures();
  if(isDeadlinePassed()){alert('Deadline has passed! Predictions are closed.');return;}
  // Check all filled
  const missing=[];
  fixtures.forEach(f=>{
    const hv=document.getElementById('h'+f.id)?.value;
    const av=document.getElementById('a'+f.id)?.value;
    if(hv===''||av===''||hv===undefined) missing.push(f.home+' vs '+f.away);
    else { if(!S.predictions[me])S.predictions[me]={}; S.predictions[me][f.id]={h:+hv,a:+av}; }
  });
  if(missing.length){
    alert('Please fill scores for all matches before submitting:\n\n'+missing.join('\n'));
    return;
  }
  if(!confirm(`Submit your predictions for ${fmtDate(activeDate)}?\n\nYou CANNOT change them after submitting.`)) return;
  if(!S.submitted[me]) S.submitted[me]={};
  S.submitted[me][activeDate]=true;
  save();
  render();
}

// ── LEADERBOARD ───────────────────────────────────────────────────────────────
function renderLeaderboard(tc) {
  const lb=leaderboard();
  const me=S.session;
  const medals=['🥇','🥈','🥉'];
  let h=`<div class="card"><p class="section-title">live standings · ${lb.length} players</p>`;
  lb.forEach((row,i)=>{
    const av=avC(row.name); const isMe=row.name===me;
    h+=`<div class="lb-row ${isMe?'me':''}">
      <div class="lb-rank">${medals[i]||'#'+(i+1)}</div>
      <div class="avatar" style="background:${av.bg};color:${av.tx}">${initials(row.name)}</div>
      <div class="lb-info">
        <div class="lb-name">${row.name}${isMe?'<span class="you-pill">you</span>':''}</div>
        <div class="lb-sub">${row.correct} correct · ${row.exact} exact · ${row.played} played</div>
      </div>
      <div><div class="lb-pts">${row.total}</div><div class="lb-ptslabel">pts</div></div>
    </div>`;
  });
  h+=`</div><div class="info-box">Points update as results are entered by admin. Predictions stay hidden until the deadline passes each day.</div>`;
  tc.innerHTML=h;
}

// ── RESULTS ───────────────────────────────────────────────────────────────────
function renderResults(tc) {
  const done=FIXTURES.filter(f=>S.results[f.id]).reverse();
  let h=`<div class="card"><p class="section-title">completed matches</p>`;
  if(!done.length){h+=`<div style="text-align:center;padding:2rem;color:var(--color-text-secondary,#666);font-size:14px">No results yet. Check back after the first match! ⚽</div>`;h+=`</div>`;tc.innerHTML=h;return;}
  done.forEach(f=>{
    const r=S.results[f.id];
    h+=`<div style="margin-bottom:12px;padding-bottom:12px;border-bottom:0.5px solid var(--color-border-tertiary,rgba(0,0,0,0.06))">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px;flex-wrap:wrap">
        <span style="font-size:14px;font-weight:500">${f.home} <span style="color:#185fa5">${r.h}–${r.a}</span> ${f.away}</span>
        <span style="font-size:11px;color:var(--color-text-secondary,#666)">Group ${f.group} · ${fmtDate(f.date)}</span>
      </div>
      <div style="display:flex;flex-wrap:wrap;gap:4px">`;
    S.members.forEach(m=>{
      const pred=(S.predictions[m.name]||{})[f.id];
      if(!pred) return;
      const pts=calcPts(pred,r);
      const cls=pts===5?'b-exact':pts===3?'b-correct':pts===1?'b-partial':'b-wrong';
      const isMe=m.name===S.session;
      h+=`<span style="font-size:12px;display:inline-flex;align-items:center;gap:3px;padding:3px 8px;border-radius:6px;background:var(--color-background-secondary,#eee);${isMe?'border:1px solid #185fa5;':''}">${m.name}: <strong>${pred.h}–${pred.a}</strong> <span class="badge ${cls}" style="font-size:10px;padding:1px 5px">+${pts}p</span></span>`;
    });
    h+=`</div></div>`;
  });
  h+=`</div>`;
  tc.innerHTML=h;
}

// ── RULES ─────────────────────────────────────────────────────────────────────
function renderRules(tc) {
  tc.innerHTML=`
  <div class="card"><p class="section-title">how it works</p>
    <div class="info-box" style="margin-bottom:14px">Every evening before <strong>10 PM IST</strong>, predict the next day's match scores. Submit once — no editing allowed after submission. Most points by July 19 wins!</div>
    ${[
      ['+5','Exact scoreline','Predicted 2–1 and it ended exactly 2–1'],

      <div><div style="font-size:14px">${t}</div><div style="font-size:12px;color:var(--color-text-secondary,#666);margin-top:2px">${s}</div></div>

  <div class="card"><p class="section-title">contest rules</p>

      ['⏰','10 PM IST deadline daily','Predictions open each evening for next day\'s matches. No entries after 10 PM.'],
      ['🔒','No editing after submit','Once you hit Submit, your predictions are final.'],

    </div>`).join('')}
  </div>`;
}

// ── ADMIN ─────────────────────────────────────────────────────────────────────
function renderAdmin(tc) {
  // Show upcoming 3 days and past
  const now = new Date();
  const istNow = new Date(now.getTime() + 5.5*60*60*1000);
  const y=istNow.getUTCFullYear(), m=String(istNow.getUTCMonth()+1).padStart(2,'0'), d=String(istNow.getUTCDate()).padStart(2,'0');
  const todayIST=`${y}-${m}-${d}`;
  const adminFixtures = [...FIXTURES].filter(f => f.date <= todayIST || f.date <= add3Days(todayIST)).slice(0, 30);

  // group by date
  const byDate={};
  adminFixtures.forEach(f=>{ if(!byDate[f.date])byDate[f.date]=[]; byDate[f.date].push(f); });

  let h=`<div class="warn-box">🔐 Admin only · PIN 9999 · Do not share this panel.</div>

  <div class="card"><p class="section-title">enter match results</p>
  <div class="info-box" style="margin-bottom:12px">After each match, enter the final score. Points calculate instantly for all players.</div>`;

  Object.keys(byDate).sort().reverse().forEach(date=>{
    h+=`<div style="font-size:11px;font-weight:500;color:var(--color-text-secondary,#666);padding:8px 0 4px;border-top:0.5px solid var(--color-border-tertiary,rgba(0,0,0,0.07));margin-top:4px">${fmtDate(date)}</div>`;
    byDate[date].forEach(f=>{
      const r=S.results[f.id];
      h+=`<div class="admin-fix-row">
        <div class="ateams">${f.home} vs ${f.away} <span style="font-size:11px;color:var(--color-text-secondary,#666)">Grp ${f.group}</span></div>`;
      if(r){
        h+=`<span class="entered-tag">${r.h}–${r.a} ✓</span>
            <button class="btn-sm" style="font-size:11px;padding:2px 8px" onclick="clearRes(${f.id})">Edit</button>`;
      } else {
        h+=`<input type="number" min="0" max="20" class="rinp" id="rh${f.id}" placeholder="H">
            <span style="font-size:12px;color:var(--color-text-secondary,#666)">–</span>
            <input type="number" min="0" max="20" class="rinp" id="ra${f.id}" placeholder="A">
            <button class="btn-save" onclick="saveRes(${f.id})">Save</button>`;
      }
      h+=`</div>`;
    });
  });
  h+=`</div>

  <div class="card"><p class="section-title">member PINs</p>
  <div class="warn-box" style="margin-bottom:10px">Send each PIN privately via WhatsApp DM — never in a group.</div>
  <table class="member-table">
    <tr><th>#</th><th>Name</th><th>PIN</th><th>Submitted today</th><th></th></tr>
    ${S.members.map((m,i)=>{
      const ad=getActivePredictionDate();
      const sub=hasSubmitted(m.name,ad)?'<span class="badge b-submitted">✓ yes</span>':'<span style="font-size:12px;color:var(--color-text-secondary,#666)">–</span>';
      return `<tr>
        <td style="color:var(--color-text-secondary,#666);font-size:12px">${i+1}</td>
        <td><input class="edit-inp" value="${m.name}" style="width:100px" onchange="upd(${i},'name',this.value)"></td>
        <td><input class="edit-inp" maxlength="4" value="${m.pin}" style="width:56px;font-family:var(--font-mono,monospace);color:#185fa5;font-weight:500;text-align:center" onchange="upd(${i},'pin',this.value)"></td>
        <td>${sub}</td>
        <td><button class="copy-btn" onclick="copyMsg('${m.name}','${m.pin}')">Copy msg</button></td>
      </tr>`;
    }).join('')}
  </table>
  </div>`;

  tc.innerHTML=h;
}

function add3Days(dateStr) {
  const d=new Date(dateStr+'T12:00:00'); d.setDate(d.getDate()+3);
  return d.toISOString().split('T')[0];
}
function saveRes(id){
  const h=document.getElementById('rh'+id)?.value;
  const a=document.getElementById('ra'+id)?.value;
  if(h===''||a===''||h===undefined) return;
  S.results[id]={h:+h,a:+a}; save(); renderAdmin(document.getElementById('tc'));
}
function clearRes(id){ delete S.results[id]; save(); renderAdmin(document.getElementById('tc')); }
function upd(i,field,val){ S.members[i][field]=val.trim(); save(); }
function copyMsg(name,pin){
  const msg=`Hi ${name}! 🏆\n\nYou're invited to our WC 2026 Office Prediction Contest!\n\n🔗 Open the app: [your-link-here]\n👤 Your name: ${name}\n🔑 Your PIN: ${pin}\n\nPredict tomorrow's match scores every day before 10 PM IST.\nMost points by July 19 wins!\n\nGood luck! ⚽`;
  navigator.clipboard?.writeText(msg).then(()=>alert('Message copied! Paste in WhatsApp to '+name)).catch(()=>alert('PIN for '+name+': '+pin));
}

render();
</script>
